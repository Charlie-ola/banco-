<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Banco Mi Plata</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="card login-card">
            <h2 class="title-white">Iniciar Sesión</h2>
            
            <input type="text" id="user" class="input-simple" placeholder="Usuario (cedula)">
            
            <input type="password" id="pass" class="input-simple" placeholder="Contraseña">
            
            <button class="btn-blue" onclick="login()">Iniciar Sesión</button>
            
            <div class="footer-links">
                <a href="#" class="link-blue-light">¿Olvidaste tu contraseña?</a>
                <p>¿No tienes una cuenta? <a href="registro.html" class="link-green-bold">Regístrate</a></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
